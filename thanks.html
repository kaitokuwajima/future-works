<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | Future Works</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--color-primary);
            padding: 2rem;
        }
        .thanks-content {
            max-width: 600px;
        }
        .thanks-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            color: var(--color-accent);
        }
        .thanks-title {
            font-family: var(--font-ja);
            font-size: 2rem;
            color: var(--color-white);
            margin-bottom: 1rem;
        }
        .thanks-text {
            font-family: var(--font-ja);
            color: var(--color-text-muted);
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        .thanks-button {
            display: inline-block;
            padding: 14px 40px;
            background: var(--color-accent);
            color: var(--color-primary);
            text-decoration: none;
            border-radius: 4px;
            font-family: var(--font-ja);
            font-weight: 500;
            transition: var(--transition);
        }
        .thanks-button:hover {
            background: var(--color-accent-dark);
            color: var(--color-white);
        }
    </style>
</head>
<body>
    <div class="thanks-page">
        <div class="thanks-content">
            <div class="thanks-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h1 class="thanks-title">送信が完了しました</h1>
            <p class="thanks-text">
                お問い合わせいただきありがとうございます。<br>
                内容を確認の上、折り返しご連絡いたします。
            </p>
            <a href="index.html" class="thanks-button">トップページに戻る</a>
        </div>
    </div>
</body>
</html>
