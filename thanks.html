<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | FRENVOX</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg);
            padding: 2rem;
        }
        .thanks-content { max-width: 500px; }
        .thanks-icon {
            width: 64px; height: 64px;
            margin: 0 auto 2rem;
            color: var(--accent);
        }
        .thanks-title {
            font-size: 1.6rem;
            color: var(--white);
            margin-bottom: 1rem;
        }
        .thanks-text {
            color: var(--text-dim);
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="thanks-page">
        <div class="thanks-content">
            <div class="thanks-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h1 class="thanks-title">送信が完了しました</h1>
            <p class="thanks-text">
                お問い合わせいただきありがとうございます。<br>
                内容を確認の上、折り返しご連絡いたします。
            </p>
            <a href="index.html" class="btn">トップページに戻る</a>
        </div>
    </div>
</body>
</html>
